spring:
  application:
    name: techshop-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techshop}
    username: ${DB_USERNAME:techshop}
    password: ${DB_PASSWORD:techshop_dev_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      # Gộp lazy-load (sanPham/anhs/nhans của card biến thể) thành vài truy vấn IN thay vì N+1.
      hibernate.default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: 587
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:dGVjaHNob3Atc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==}
    access-token-expiry-ms: 900000       # 15 phút
    refresh-token-expiry-ms: 604800000   # 7 ngày
  otp:
    expiry-minutes: 5
  mail:
    from: ${MAIL_FROM:noreply@techshop.vn}
    dev-mode: ${MAIL_DEV_MODE:false}     # true = log OTP ra console, không gửi email
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  admin:
    # Tài khoản quản trị mặc định (AdminSeeder tạo nếu chưa có). Đổi ở prod qua biến môi trường.
    phone: ${ADMIN_PHONE:0999999999}
    password: ${ADMIN_PASSWORD:Admin@123}
    full-name: ${ADMIN_FULLNAME:Quản trị viên}
